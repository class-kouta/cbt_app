services:
  # PHP-FPM (app) サービス
  app:
    container_name: cbt-app
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    volumes:
      - ./:/var/www
    depends_on:
      - db

  # Nginx (web) サービス
  web:
    container_name: cbt-web
    image: nginx:1.25-alpine
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  # PostgreSQL (db) サービス
  db:
    container_name: cbt-db
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - cbt_db_data:/var/lib/postgresql/data

  # Mailpit (mail) サービス - ローカル開発用メールサーバー
  mail:
    container_name: cbt-mail
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  cbt_db_data:
